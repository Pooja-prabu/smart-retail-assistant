<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Retail Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .ai-btn {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .ai-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .card-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .card-price {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 20px;
        }

        .card-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .card-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Retail Products</h1>
            <button class="ai-btn" onclick="window.location.href='chat.html'">Go to AI Assistant</button>
        </div>

        <div class="product-grid" id="productGrid">
            <p>Loading products...</p>
        </div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const res = await fetch('/products');
                const data = await res.json();
                const grid = document.getElementById('productGrid');
                
                if (data.length === 0) {
                    grid.innerHTML = '<p>No products available.</p>';
                    return;
                }

                grid.innerHTML = data.map(p => `
                    <div class="card">
                        <div>
                            <div class="card-category">${p.category}</div>
                            <h3 class="card-title">${p.name}</h3>
                            <div class="card-price">₹${p.price}</div>
                        </div>
                        <button class="card-btn" onclick="askAI('${p.name.replace(/'/g, "\\'")}')">Ask AI</button>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('productGrid').innerHTML = '<p>Failed to load products.</p>';
            }
        }

        function askAI(name) {
            localStorage.setItem('askAI_Query', `Tell me more about the ${name}`);
            window.location.href = 'chat.html';
        }

        loadProducts();
    </script>
</body>
</html>
