<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Retail Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --bot-bubble: rgba(51, 65, 85, 0.8);
            --user-bubble: rgba(59, 130, 246, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            background: var(--chat-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .insights-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .insights-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-window::-webkit-scrollbar {
            width: 6px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05);
        }

        .product-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .product-title {
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
        }
        .product-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--primary);
        }
        .product-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
        }

        .input-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-box:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        /* Insights Modal */
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: #1e293b;
            padding: 24px;
            border-radius: 16px;
            width: 80%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-title { margin-bottom: 12px; font-weight: 600;}
        .modal-stat { margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);}
        .modal-stat span { color: #fff; font-weight: 600;}
        
        .close-btn {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--bot-bubble);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: var(--text-muted);
            font-size: 0.85rem;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>AI Retail Assistant</h1>
            <button class="insights-btn" onclick="openInsights()">Insights</button>
        </div>

        <div class="chat-window" id="chatWindow">
            <div class="message bot" style="opacity: 1; transform: translateY(0);">
                Hi there! I'm your Smart Retail Assistant. Looking for shoes, electronics, or clothes? Let me know your budget!
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">Assistant is thinking...</div>

        <div class="input-area">
            <input type="text" id="userInput" class="input-box" placeholder="e.g., shoes under 2000" autocomplete="off" onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>

        <!-- Insights Modal -->
        <div class="modal" id="insightsModal">
            <div class="modal-content">
                <h2 class="modal-title">Live Insights</h2>
                <div id="insightsData">Loading...</div>
                <button class="close-btn" onclick="closeInsights()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const insightsModal = document.getElementById('insightsModal');
        const insightsData = document.getElementById('insightsData');

        function appendMessage(text, sender, products = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;

            if (products.length > 0 && sender === 'bot') {
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-title">${p.name}</div>
                        <div class="product-details">
                            <span>₹${p.price}</span>
                            <span>★ ${p.rating}</span>
                        </div>
                        <div class="product-desc">${p.description}</div>
                    `;
                    msgDiv.appendChild(card);
                });
            }

            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            typingIndicator.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                appendMessage(data.explanation, 'bot', data.products);
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Sorry, I encountered an error. Please try again.", 'bot');
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function openInsights() {
            insightsModal.style.display = 'flex';
            insightsData.innerHTML = "Fetching...";
            try {
                const res = await fetch('/insights');
                const data = await res.json();
                insightsData.innerHTML = `
                    <div class="modal-stat">Total Queries: <span>${data.total_queries}</span></div>
                    <div class="modal-stat">Top Category: <span>${data.most_searched_category}</span></div>
                    <div class="modal-stat" style="margin-top: 12px; font-size: 0.8rem;">Recent Queries:</div>
                    <ul style="font-size: 0.8rem; color: #94a3b8; padding-left: 15px;">
                        ${data.recent_queries.map(q => `<li>${q}</li>`).join('') || "<li>No queries yet.</li>"}
                    </ul>
                `;
            } catch (e) {
                insightsData.innerHTML = "Error loading insights.";
            }
        }

        function closeInsights() {
            insightsModal.style.display = 'none';
        }
    </script>
</body>
</html>
